services:
  postgres:
    image: postgres:17-alpine
    container_name: cozydevs-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cozydevs
      POSTGRES_USER: cozydevs
      POSTGRES_PASSWORD: cozydevs
    ports:
      - "54322:5432"
    volumes:
      - cozydevs-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozydevs -d cozydevs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cozydevs-dev-postgres-data:
