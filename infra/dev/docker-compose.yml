name: changeme
services:
  postgres:
    image: postgres:17-alpine
    container_name: workspace-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workspace
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: workspace
    ports:
      - "54322:5432"
    volumes:
      - workspace-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace -d workspace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  workspace-dev-postgres-data:
